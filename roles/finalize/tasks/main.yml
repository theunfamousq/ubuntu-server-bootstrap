- name: Resolve initial user finalization settings
  ansible.builtin.set_fact:
    finalize_disable_initial_user: "{{ auto_disable_initial_user_after_switch | default(auto_disable_ubuntu_after_switch | default(true)) }}"
    finalize_initial_user_to_disable: "{{ initial_user_to_disable | default('ubuntu') }}"

- name: Restart system to apply all updates
  ansible.builtin.reboot:
    msg: "Reboot initiated by Ansible for finalizing the system setup."
    connect_timeout: 5
    reboot_timeout: 600
    pre_reboot_delay: 0
    post_reboot_delay: 15
    test_command: whoami
  when: reboot_after_finalize | bool

- name: Check whether initial user exists
  ansible.builtin.getent:
    database: passwd
    key: "{{ finalize_initial_user_to_disable }}"
  register: finalize_initial_user_getent
  failed_when: false
  changed_when: false
  when:
    - finalize_disable_initial_user | bool
    - finalize_initial_user_to_disable | length > 0

- name: Disable initial provisioning user for security
  when:
    - finalize_disable_initial_user | bool
    - finalize_initial_user_to_disable | length > 0
    - finalize_initial_user_getent is succeeded
  block:
    - name: Remove supplementary groups for {{ finalize_initial_user_to_disable }}
      ansible.builtin.user:
        name: "{{ finalize_initial_user_to_disable }}"
        groups: ""
        append: false

    - name: Remove all SSH keys from {{ finalize_initial_user_to_disable }}
      ansible.builtin.copy:
        dest: "{{ ansible_facts.getent_passwd[finalize_initial_user_to_disable][4] }}/.ssh/authorized_keys"
        content: ""
        owner: "{{ finalize_initial_user_to_disable }}"
        group: "{{ ansible_facts.getent_passwd[finalize_initial_user_to_disable][2] }}"
        mode: "0600"
      failed_when: false

    - name: Lock password for {{ finalize_initial_user_to_disable }}
      ansible.builtin.user:
        name: "{{ finalize_initial_user_to_disable }}"
        password_lock: true

    - name: Set shell to nologin for {{ finalize_initial_user_to_disable }}
      ansible.builtin.user:
        name: "{{ finalize_initial_user_to_disable }}"
        shell: /usr/sbin/nologin

# ---- End play ----
- name: End play
  ansible.builtin.meta: end_play
